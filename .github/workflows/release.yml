name: Build and Release

on:
  push:
    tags: ["v*.*.*", "v*.*.*-*"]

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Set release version from tag
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart("v")
          npm version $version --no-git-tag-version --allow-same-version

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version-file: ".python-version"

      - name: Install npm dependencies
        run: npm ci

      - name: Sync Python dependencies
        run: uv sync --locked

      - name: Install Playwright browsers
        run: uv run playwright install chromium

      - name: Build application
        run: |
          npm run build:backend
          npm run build

      - name: Package Windows artifacts
        run: npx electron-builder --win dir nsis --publish never

      - name: Create shortcut
        run: |
          $ws = New-Object -ComObject WScript.Shell
          $lnk = $ws.CreateShortcut("release\win-unpacked\QLUToolbox.lnk")
          $lnk.TargetPath = ".\QLUToolbox.exe"
          $lnk.Save()

      - name: Package as zip
        run: |
          $version = "${{ github.ref_name }}"
          Rename-Item release\win-unpacked QLUToolbox
          Compress-Archive -Path release\QLUToolbox -DestinationPath "QLUToolbox_$version.zip"

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          files: |
            QLUToolbox_${{ github.ref_name }}.zip
            release/QLUToolbox_*_Setup.exe
          fail_on_unmatched_files: true
          generate_release_notes: true
